version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: velora
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]

  app:
    build: .
    command: ["/usr/local/bin/velora", "server"]
    depends_on:
      - db
      - redis
    environment:
      - APP_ENV=development
      - APP_PORT=8080
      - DATABASE_URL=postgres://postgres:postgres@db:5432/velora?sslmode=disable
      - REDIS_URL=redis:6379
      - JWT_SECRET=dev_jwt_secret
      - JWT_REFRESH_SECRET=dev_refresh_secret
      - GEMINI_API_KEY=your_gemini_api_key
      - GEMINI_API_URL=https://generativelanguage.googleapis.com
      - RATE_LIMIT_MAX=500
      - RATE_LIMIT_WINDOW=1m
    ports:
      - "8080:8080"

  worker:
    build: .
    command: ["/usr/local/bin/velora", "worker"]
    depends_on:
      - db
      - redis
    environment:
      - APP_ENV=development
      - DATABASE_URL=postgres://postgres:postgres@db:5432/velora?sslmode=disable
      - REDIS_URL=redis:6379
      - JWT_SECRET=dev_jwt_secret
      - JWT_REFRESH_SECRET=dev_refresh_secret
      - GEMINI_API_KEY=your_gemini_api_key
      - GEMINI_API_URL=https://generativelanguage.googleapis.com
      - RATE_LIMIT_MAX=500
      - RATE_LIMIT_WINDOW=1m

volumes:
  db_data:
